<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dang nhap</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .login-box {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <!-- FORM LOGIN -->
    <div class="login-box">
        <h2>Dang nhap</h2>

        <label>Ten dang nhap</label>
        <input type="text" id="textboxusername">

        <label>Mat khau</label>
        <input type="password" id="textboxmatkhau">

        <button id="btnlogin" onclick="login()">Dang nhap</button>
    </div>

    <script>
        function login() {
            var user = document.getElementById("textboxusername").value;
            var pass = document.getElementById("textboxmatkhau").value;

            if (user === "admin" && pass === "admin") {
                // Chuyển sang trang thành công
                window.location.href = "success.html";
            } else {
                alert("Sai tai khoan hoac mat khau");
            }
        }
    </script>

</body>
</html>
